<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Σύνδεση/Εγγραφή</title>
<link rel="icon" type="image/png" href="logo.jpg"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<script src='https://kit.fontawesome.com/a076d05399.js'></script>
<style>
html {
  scroll-behavior: smooth;
}
body {
  margin: 0;
  font-size: 15px;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #fafafa;
}
      
/* Full-width input fields */
input[type=text], input[type=password] {
    width: 100%;
    padding: 15px;
    margin: 5px 0 22px 0;
    display: inline-block;
    border: none;
    background: #f1f1f1;
}

input[type=text]:focus, input[type=password]:focus {
  background-color: #ddd;
  outline: none;
}

#select_option1 {
    width: 100%;
    padding: 15px;
    margin: 5px 0 22px 0;
    display: inline-block;
    border: none;
    background: #f1f1f1;
}

#select_option2 {
    width: 100%;
    padding: 15px;
    margin: 5px 0 22px 0;
    display: inline-block;
    border: none;
    background: #f1f1f1;
}

.registerbtn {
  background-color: #4CAF50;
  color: white;
  padding: 16px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 20%;
  opacity: 0.9;
  border-radius: 3px;
}

.registerbtn:hover {
  opacity: 1;
}

hr {
  border: 2px solid #f1f1f1;
  margin-bottom: 25px;
}

a:link {
  color: #2b67f0;
  background-color: transparent;
  text-decoration: none;
}
a:hover {
  color: red;
  background-color: transparent;
}

/* Extra styles for the cancel button */
.cancelbtn {
    width: auto;
    padding: 10px 18px;
    cursor: pointer;
    border: none;
    color: white;
    background-color: #f44336;
}
    
.cancelbtn:hover {
    opacity: 0.8;        
}

.container {
    padding: 16px;
}

span.psw {
    float: right;
    padding-top: 16px;
}

/* The Close Button (x) */
.close {
    position: absolute;
    right: 25px;
    top: 0;
    color: #000;
    font-size: 35px;
    font-weight: bold;
}

.close:hover,
.close:focus {
    color: red;
    cursor: pointer;
}

/* Add Zoom Animation */
.animate {
    -webkit-animation: animatezoom 0.6s;
    animation: animatezoom 0.6s
}

@-webkit-keyframes animatezoom {
    from {-webkit-transform: scale(0)} 
    to {-webkit-transform: scale(1)}
}
    
@keyframes animatezoom {
    from {transform: scale(0)} 
    to {transform: scale(1)}
}

/* Change styles for span and cancel button on extra small screens */
@media screen and (max-width: 300px) {
    span.psw {
       display: block;
       float: none;
    }
    .cancelbtn {
       width: 100%;
    }
}    

.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: #b3afaf;
    overflow-x: hidden;
    transition: 0.5s;
    padding-top: 60px;
}

.sidebar a {
    padding: 8px 8px 8px 32px;
    text-decoration: none;
    font-size: 25px;
    color: white;
    display: block;
    transition: 0.3s;
}

.sidebar a:hover:not(.active) {
  background-color: whitesmoke;
  color: white;
}

.sidebar .closebtn {
    position: absolute;
    top: 0;
    right: 25px;
    font-size: 36px;
    margin-left: 50px;
}
    
#close:hover {
  background-color: #b3afaf;        
}     
    
    
#login_signup:hover {
  color: grey;    
}        

#articles:hover {
  color: grey;        
}
    
#about:hover {
  color: grey;    
}
	
.openbtn {
    font-size: 20px;
    cursor: pointer;
    background-color: #bdb7b7;
    border-radius: 5px;
    color: white;
    padding: 10px 15px;
    border: none;
	margin: 20px 135px;
}

.openbtn:hover {
    background-color: grey;
}

.cop {
   display: inline-block;
   padding: 10px 15px;
   margin: 20px 135px;
   font-size: 18px;
}

.cop:hover {
   font-weight: bold;
}

.button {
    background-color: white;
    color: grey;
    border: 2px solid grey;
    border-radius: 5px;
    padding: 10px 15px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 20px 135px;
    -webkit-transition-duration: 0.4s; /* Safari */
    transition-duration: 0.4s;
    cursor: pointer;
    
}

.button:hover {
    background-color: grey;
    color: white;
}

#myBtn {
  display: none;
  position: fixed;
  height: 55px;
  width: 55px;
  bottom: 20px;
  right: 30px;
  z-index: 99;
  font-size: 18px;
  border: none;
  outline: none;
  background-color: #bdb7b7;
  color: white;
  cursor: pointer;
  padding: 15px;
  border-radius: 50px;
}

#myBtn:hover {
  background-color: #555;
}

.header {
  position: fixed;
  top: 0;
  z-index: 1;
  width: 100%;
  background-color: #ffffff;
}

.header h2 {
  text-align: center;
}

.progress-container {
  width: 100%;
  height: 6px;
  background: #ccc;
}

.progress-bar {
  height: 6px;
  background: #2e2d2d;
  width: 0%;
}

.content {
  padding: 120px 0;
  margin: 50px auto 0 auto;
  width: 80%;
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
  height: 150px;
}

.hero-text {
  text-align: center;
  position: absolute;
  top: 30%;
  left: 40%;
  transform: translate(-50%, -50%);
  color: black;
}

.content2 {
  padding: 16px;
  background-color: white;
}


#snackbar {
    visibility: hidden;
    min-width: 250px;
    margin-left: -125px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 5px;
    padding: 16px;
    position: fixed;
    z-index: 1;
    left: 50%;
    bottom: 30px;
    font-size: 20px;
}

#snackbar.show {
    visibility: visible;
    -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
    animation: fadein 0.5s, fadeout 0.5s 2.5s;
}

@-webkit-keyframes fadein {
    from {bottom: 0; opacity: 0;} 
    to {bottom: 30px; opacity: 1;}
}

@keyframes fadein {
    from {bottom: 0; opacity: 0;}
    to {bottom: 30px; opacity: 1;}
}

@-webkit-keyframes fadeout {
    from {bottom: 30px; opacity: 1;} 
    to {bottom: 0; opacity: 0;}
}

@keyframes fadeout {
    from {bottom: 30px; opacity: 1;}
    to {bottom: 0; opacity: 0;}
}
</style>
</head>
<body>

<div class="header">
  <h2>DoctorTime<img src="logo.jpg" style="vertical-align:middle;width:60px;height:60px;"></h2>
  <div class="progress-container">
    <div class="progress-bar" id="myBar"></div>
  </div>  
</div>

<div class="content">
    <div>
    <h1 style="font-size:30px">Εγγραφή νέου χρήστη</h1><br>
	<form method="post" action="/DoctorTime/SignUpServlet">
	<input type="hidden" name="requestType" value="Insert" />
	<label for="name"><b>Όνομα</b></label>
    <input type="text" placeholder="Εισάγετε το όνομά σας" name="name" required>
	
	<label for="surname"><b>Επώνυμο</b></label>
    <input type="text" placeholder="Εισάγετε το επώνυμό σας" name="surname" required>
	
    <label for="email1"><b>Email</b></label>
    <input type="text" placeholder="Εισάγετε το email σας" name="email1" required>

    <label for="password"><b>Κωδικός πρόσβασης</b></label>
    <input type="password" placeholder="Εισάγετε τον κωδικό σας" name="password" required>
	
	<label for="select_option"><b>Τι είστε</b></label>
	<select id="select_option1" name="selectoption1" required="" onChange="Enablespecialty()">
    <option value="">Επίλεξε τι από τα δύο είστε</option>
    <option value="Ασθενής">Ασθενής</option>
    <option value="Γιατρός">Γιατρός</option>
    </select>
    
	<label for="select_option"><b>Ειδικότητα (Γιατρός)</b></label>
	<select id="select_option2" name="selectoption2" required="" disabled="disabled">
    <option value="">Επίλεξε ειδικότητα αν είστε γιατρός</option>
    <option value="Καρδιολόγος">Καρδιολόγος</option>
    <option value="Οδοντίατρος">Οδοντίατρος</option>
	<option value="Οφθαλμίατρος">Οφθαλμίατρος</option>
	<option value="Ουρολόγος">Ουρολόγος</option>
	<option value="Ορθοπαιδικός">Ορθοπαιδικός</option>
	<option value="Παθολόγος">Παθολόγος</option>
	<option value="Ρευματολόγος">Ρευματολόγος</option>
	<option value="Ψυχίατρος">Ψυχίατρος</option>
    </select>
	
    <button type="submit" class="registerbtn">Εγγραφή</button>
    </form><br><br><hr>
	<a href="HomePage.html">Αρχική σελίδα</a><br><br><br><br> 
  </div>
</div>

<div id="snackbar">Snackbar</div>

<button onclick="topFunction()" id="myBtn" title="Πηγαίντε στη κορυφή"><i class="material-icons">expand_less</i></button>


<script>
// When the user scrolls the page, execute myFunction 
window.onscroll = function() {myFunction(),scrollFunction()};

function myFunction() {
  var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  var scrolled = (winScroll / height) * 100;
  document.getElementById("myBar").style.width = scrolled + "%";
}

function newFunction() {
    var x = document.getElementById("snackbar");
    x.className = "show";
    setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
}

function scrollFunction() {
    if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
        document.getElementById("myBtn").style.display = "block";
    } else {
        document.getElementById("myBtn").style.display = "none";
    }
}

function Enablespecialty() {
        if(document.getElementById("select_option1").value == "Γιατρός"){
		       document.getElementById("select_option2").disabled=false;
		}
		else{
		       document.getElementById("select_option2").disabled=true;
			   document.getElementById("select_option2").value="";
		}
        
    }

// When the user clicks on the button, scroll to the top of the document
function topFunction() {
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
}

function openNav() {
    document.getElementById("mySidebar").style.width = "250px";
    document.getElementById("main").style.marginLeft = "250px";
}

function closeNav() {
    document.getElementById("mySidebar").style.width = "0";
    document.getElementById("main").style.marginLeft= "0";
}
    
// Get the modal
var modal = document.getElementById('id01');

// When the user clicks anywhere outside of the modal, close it
window.onclick = function(event) {
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
