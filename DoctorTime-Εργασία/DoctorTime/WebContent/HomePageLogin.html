<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DoctorTime</title>
<link rel="icon" type="image/png" href="logo.jpg"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<script src='https://kit.fontawesome.com/a076d05399.js'></script>
<style>
html {
  scroll-behavior: smooth;
}
body {
  margin: 0;
  font-size: 15px;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #fafafa;
}
      
/* Full-width input fields */
input[type=text], input[type=password] {
    width: 100%;
    padding: 12px 20px;
    margin: 8px 0;
    display: inline-block;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

hr {
  border: 2px solid #f1f1f1;
  margin-bottom: 25px;
}

a:link {
  color: #2b67f0;
  background-color: transparent;
  text-decoration: none;
}
a:hover {
  color: red;
  background-color: transparent;
}

/* Extra styles for the cancel button */
.cancelbtn {
    width: auto;
    padding: 10px 18px;
    cursor: pointer;
    border: none;
    color: white;
    background-color: #f44336;
}
    
.cancelbtn:hover {
    opacity: 0.8;        
}

.container {
    padding: 16px;
}

span.psw {
    float: right;
    padding-top: 16px;
}

/* The Close Button (x) */
.close {
    position: absolute;
    right: 25px;
    top: 0;
    color: #000;
    font-size: 35px;
    font-weight: bold;
}

.close:hover,
.close:focus {
    color: red;
    cursor: pointer;
}

/* Add Zoom Animation */
.animate {
    -webkit-animation: animatezoom 0.6s;
    animation: animatezoom 0.6s
}

@-webkit-keyframes animatezoom {
    from {-webkit-transform: scale(0)} 
    to {-webkit-transform: scale(1)}
}
    
@keyframes animatezoom {
    from {transform: scale(0)} 
    to {transform: scale(1)}
}

/* Change styles for span and cancel button on extra small screens */
@media screen and (max-width: 300px) {
    span.psw {
       display: block;
       float: none;
    }
    .cancelbtn {
       width: 100%;
    }
}    

.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: #b3afaf;
    overflow-x: hidden;
    transition: 0.5s;
    padding-top: 60px;
}

.sidebar a {
    padding: 8px 8px 8px 32px;
    text-decoration: none;
    font-size: 25px;
    color: white;
    display: block;
    transition: 0.3s;
}

.sidebar a:hover:not(.active) {
  background-color: whitesmoke;
  color: white;
}

.sidebar .closebtn {
    position: absolute;
    top: 0;
    right: 25px;
    font-size: 36px;
    margin-left: 50px;
}
    
#close:hover {
  background-color: #b3afaf;        
}     
    
    
#signout:hover {
  color: grey;    
}        

#articles:hover {
  color: grey;        
}
    
#about:hover {
  color: grey;    
}

#delete_account:hover {
  color: red;
}
	
.openbtn {
    font-size: 20px;
    cursor: pointer;
    background-color: #bdb7b7;
    border-radius: 5px;
    color: white;
    padding: 10px 15px;
    border: none;
	margin: 20px 135px;
}

.openbtn:hover {
    background-color: grey;
}

.cop {
   display: inline-block;
   padding: 10px 15px;
   margin: 20px 135px;
   font-size: 18px;
}

.cop:hover {
   font-weight: bold;
}

.button {
    background-color: white;
    color: grey;
    border: 2px solid grey;
    border-radius: 5px;
    padding: 10px 15px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 20px 135px;
    -webkit-transition-duration: 0.4s; /* Safari */
    transition-duration: 0.4s;
    cursor: pointer;
    
}

.button:hover {
    background-color: grey;
    color: white;
}

#myBtn {
  display: none;
  position: fixed;
  height: 55px;
  width: 55px;
  bottom: 20px;
  right: 30px;
  z-index: 99;
  font-size: 18px;
  border: none;
  outline: none;
  background-color: #bdb7b7;
  color: white;
  cursor: pointer;
  padding: 15px;
  border-radius: 50px;
}

#myBtn:hover {
  background-color: #555;
}

.header {
  position: fixed;
  top: 0;
  z-index: 1;
  width: 100%;
  background-color: #ffffff;
}

.header h2 {
  text-align: center;
}

.progress-container {
  width: 100%;
  height: 6px;
  background: #ccc;
}

.progress-bar {
  height: 6px;
  background: #2e2d2d;
  width: 0%;
}

.content {
  padding: 120px 0;
  margin: 50px auto 0 auto;
  width: 80%;
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
  height: 150px;
}

.hero-text {
  text-align: center;
  position: absolute;
  top: 40%;
  left: 26%;
  transform: translate(-50%, -50%);
  color: white;
}

.content2 {
  padding: 0px 0;
  margin: 0 auto 0 auto;
  width: 80%;
}


#snackbar {
    visibility: hidden;
    min-width: 250px;
    margin-left: -125px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 5px;
    padding: 16px;
    position: fixed;
    z-index: 1;
    left: 50%;
    bottom: 30px;
    font-size: 20px;
}

#snackbar.show {
    visibility: visible;
    -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
    animation: fadein 0.5s, fadeout 0.5s 2.5s;
}

@-webkit-keyframes fadein {
    from {bottom: 0; opacity: 0;} 
    to {bottom: 30px; opacity: 1;}
}

@keyframes fadein {
    from {bottom: 0; opacity: 0;}
    to {bottom: 30px; opacity: 1;}
}

@-webkit-keyframes fadeout {
    from {bottom: 30px; opacity: 1;} 
    to {bottom: 0; opacity: 0;}
}

@keyframes fadeout {
    from {bottom: 30px; opacity: 1;}
    to {bottom: 0; opacity: 0;}
}
</style>
</head>
<body>

<div class="header">
  <h2>DoctorTime<img src="logo.jpg" style="vertical-align:middle;width:60px;height:60px;"></h2>
  <div class="progress-container">
    <div class="progress-bar" id="myBar"></div>
  </div>  
</div>

<div class="content" style="background-image: url('background.jpg');">
    <div class="hero-text">
    <h1 style="font-size:40px">Καλώς ήρθες Ασθενή!</h1>
    <h2>Βρες τον γιατρό και <br>
	τις εξετάσεις που χρειάζεσαι</h2>
	</div>
</div>

<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()" id="close"><i class="material-icons">close</i></a>
  <a href="HomePage.html" id="signout">Αποσύνδεση</a>
  <a href="ArticlesLogin.html" id="articles">Άρθρα</a>
  <a href="AboutLogin.html" id="about">Πληροφορίες</a>
  <a href="DeleteAccountPatient.html" id="delete_account">Διαγραφή λογαριασμού</a>
</div>

<button class="openbtn" onclick="openNav()"><i class="fa fa-bars"></i> Μενού</button>

<button class="openbtn" onclick="location.href='PatientExaminations.html'"><i class="fas fa-file-medical"></i> Εξετάσεις</button>

<button class="openbtn" onclick="location.href='/DoctorTime/DoctorsList'"><i class='fas fa-portrait'></i> Προβολή γιατρών</button>

<button class="openbtn" onclick="location.href='PatientMessages.html'"><i class="fas fa-envelope-square"></i> Μηνύματα</button>

<div id="snackbar">Snackbar</div>

<button onclick="topFunction()" id="myBtn" title="Πηγαίντε στη κορυφή"><i class="material-icons">expand_less</i></button>


<script>
// When the user scrolls the page, execute myFunction 
window.onscroll = function() {myFunction(),scrollFunction()};

function myFunction() {
  var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  var scrolled = (winScroll / height) * 100;
  document.getElementById("myBar").style.width = scrolled + "%";
}

function newFunction() {
    var x = document.getElementById("snackbar");
    x.className = "show";
    setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
}

function scrollFunction() {
    if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
        document.getElementById("myBtn").style.display = "block";
    } else {
        document.getElementById("myBtn").style.display = "none";
    }
}

// When the user clicks on the button, scroll to the top of the document
function topFunction() {
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
}

function openNav() {
    document.getElementById("mySidebar").style.width = "250px";
    document.getElementById("main").style.marginLeft = "250px";
}

function closeNav() {
    document.getElementById("mySidebar").style.width = "0";
    document.getElementById("main").style.marginLeft= "0";
}
    
// Get the modal
var modal = document.getElementById('id01');

// When the user clicks anywhere outside of the modal, close it
window.onclick = function(event) {
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
